name: Docker Container Monitor

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/6 * * * *'  # Ejecuta cada 6 minutos

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t my-container .

    - name: Start 4 containers
      run: |
        for i in {1..4}; do
          docker run -d --name container-$i -p 590$i:5901 -p 22$i:22 my-container
        done

    - name: Wait 6 minutes
      run: |
        echo "Esperando 6 minutos antes de detener los contenedores"
        sleep 360

    - name: Stop containers
      run: |
        for i in {1..4}; do
          docker stop container-$i || true
          docker rm container-$i || true
        done

    - name: Cleanup
      if: always()
      run: |
        docker system prune -f