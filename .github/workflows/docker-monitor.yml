name: Docker Container Monitor

on:
  push:
    branches: [ main ]
#  schedule:
#    - cron: '*/6 * * * *'  # Ejecuta cada 6 minutos

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8  # Configura el tiempo límite en minutos
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t my-container .

    - name: Start 4 containers
      run: |
        for i in {1..4}; do
          NEW_NAME="container-$i"
          docker run -d --name $NEW_NAME -p 590$i:5901 -p 22$i:22 my-container
          echo "Iniciado $NEW_NAME"
        done
