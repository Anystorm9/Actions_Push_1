name: Build and Deploy SikuliX Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t sikulix-app .

      - name: Run Docker container
        run: |
          docker run --rm sikulix-app

      - name: Test SikuliX scripts
        run: |
          echo "Testing SikuliX scripts..."
          # Add script testing commands here
          echo "Script testing completed"
